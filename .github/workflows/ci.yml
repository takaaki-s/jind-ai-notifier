name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: shellcheck
        run: shellcheck notifier.sh test/stubs/jin

      - name: vendor bats-core
        run: git clone --depth 1 https://github.com/bats-core/bats-core.git test/lib/bats-core

      - name: bats
        run: test/lib/bats-core/bin/bats test
