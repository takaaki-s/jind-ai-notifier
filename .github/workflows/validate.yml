name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

# jin ships prebuilt tarballs per release. Bumping JIN_VERSION invalidates
# the cache and re-downloads. No Go toolchain is needed on the runner.
env:
  JIN_VERSION: "0.8.0"  # first release that supports schema_version: 2 + actions[].listener

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: cache jin binary
        id: cache-jin
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.local/bin/jin
          key: jin-v${{ env.JIN_VERSION }}-${{ runner.os }}-amd64

      - name: install jin
        if: steps.cache-jin.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.local/bin
          curl -fsSL "https://github.com/takaaki-s/jind-ai/releases/download/v${JIN_VERSION}/jind-ai_${JIN_VERSION}_linux_amd64.tar.gz" \
            | tar -xzC ~/.local/bin jin

      - name: jin plugin validate
        shell: bash
        run: ~/.local/bin/jin plugin validate --github-actions
