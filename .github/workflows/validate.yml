name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      # The manifest uses features (schema_version: 2, actions[].listener)
      # that only landed in jin's main after 0.7.1, so build the CLI from
      # source rather than pinning to a shipped release.
      - name: install jin
        shell: bash
        run: go install github.com/takaaki-s/jind-ai/cmd/jin@main

      - name: jin plugin validate
        shell: bash
        run: jin plugin validate --github-actions
