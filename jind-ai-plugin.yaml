schema_version: 2

# `name` is the registry-unique identifier for this plugin. It doubles as the
# directory jind-ai installs it under and the verb for `jin plugin run <name>`,
# so it must match on all three axes — pick a globally unique, hyphenated name.
name: jind-ai-notifier

version: 0.4.0
description: Desktop notifications and pending-work popup for jin sessions
license: MIT
homepage: https://github.com/takaaki-s/jind-ai-notifier

# The plugin uses `actions[].listener` — a jin 0.8.0 feature that hides the
# event-only action from the palette / completion.
jin: ">=0.8.0"

# notifier.sh ships in the repo and is the entrypoint directly. Each action
# calls the same script with a different argv verb. Under schema v2 the
# per-action entrypoint declaration replaces the v1 top-level
# `install.source.entrypoint`.
install:
  source: {}

# `notify-send -A` blocks until the desktop notification is clicked or closed,
# which routinely exceeds the 30s default. A run SIGTERM'd at 90s only loses
# the click-to-focus convenience — the stock file was already updated. This
# top-level timeout applies to every action; per-action overrides are a
# follow-up on the jin side.
timeout: 90s

actions:
  # Default action (actions[0]) — what `jin plugin run jind-ai-notifier` runs
  # and what tmux keybindings should target. Opens the pending-sessions popup.
  - id: list
    entrypoint: ./notifier.sh list
    label: "Show pending sessions"
    # Preferred popup size as percentages of the terminal (1-100 each). Users
    # override this under `popups.plugins.jind-ai-notifier` in their jin config
    # — see the Customization section in README.md.
    popup:
      width: 70
      height: 60

  # Event-only listener — matches every status_changed transition and filters
  # inside the script on JIN_NOTIFY_KIND (matchers cannot express that axis).
  # `listener: true` hides the action from the palette / help / completion so
  # a user browsing them does not see an entry that has no manual-invoke
  # semantics; direct debug invocation via
  # `jin plugin run jind-ai-notifier listen` still works.
  - id: listen
    entrypoint: ./notifier.sh listen
    on: ["status_changed"]
    listener: true
