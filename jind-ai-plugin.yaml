schema_version: 1

# `name` is the registry-unique identifier for this plugin. It doubles as the
# directory jind-ai installs it under and the verb for `jin plugin run <name>`,
# so it must match on all three axes — pick a globally unique, hyphenated name.
name: jind-ai-notifier

version: 0.3.0
description: Desktop notifications and pending-work popup for jin sessions
license: MIT
homepage: https://github.com/takaaki-s/jind-ai-notifier

# Optional build is omitted: notifier.sh ships in the repo and is the entrypoint
# directly. The runtime dispatcher exec's this path on every event.
jin: ">=0.7.1"
install:
  source:
    entrypoint: ./notifier.sh

# Subscribe to every status transition and filter inside the script: the
# interesting axis is JIN_NOTIFY_KIND (task-complete / permission), which
# matchers cannot express. Action runs (`jin plugin run jind-ai-notifier`)
# bypass matchers entirely.
on: ["status_changed"]

# `notify-send -A` blocks until the desktop notification is clicked or closed,
# which routinely exceeds the 30s default. A run SIGTERM'd at 90s only loses
# the click-to-focus convenience — the stock file was already updated.
timeout: 90s

# Preferred popup size as percentages of the terminal (1-100 each). The list
# of pending sessions is short and reads well in a 70x60 area; users can
# override this in their jin config under `popups.plugins.jind-ai-notifier`
# — see the Customization section in README.md.
popup:
  width: 70
  height: 60
